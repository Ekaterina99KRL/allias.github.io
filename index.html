const { useState, useEffect, useRef, useCallback, useMemo } = React;

function makeIcon(name) {
  return function IconCmp(props) {
    const { size = 18, color, strokeWidth = 2, style = {}, ...rest } = props || {};
    const ref = useRef(null);
    useEffect(() => {
      const host = ref.current;
      if (!host) return;
      host.innerHTML = "";
      try {
        const node = (window.lucide && (window.lucide.icons ? window.lucide.icons[name] : window.lucide[name]));
        if (!node) return;
        const el = window.lucide.createElement(node);
        el.setAttribute("width", size);
        el.setAttribute("height", size);
        el.setAttribute("stroke-width", strokeWidth);
        host.appendChild(el);
      } catch (e) {}
    }, [size, strokeWidth, name]);
    return React.createElement("span", {
      ref,
      style: { display: "inline-flex", alignItems: "center", lineHeight: 0, color, ...style },
      ...rest,
    });
  };
}
const Check = makeIcon("Check"), X = makeIcon("X"), Volume2 = makeIcon("Volume2"),
  Volume1 = makeIcon("Volume1"), VolumeX = makeIcon("VolumeX"), Pause = makeIcon("Pause"),

function SyncStatus() {
  const [open, setOpen] = useState(false);
  const [val, setVal] = useState("");
  const ok = /^https?:\/\//i.test(val.trim());
  const save = () => { try { localStorage.setItem("alias:dburl", val.trim().replace(/\/+$/, "")); } catch (e) {} location.reload(); };
  const clear = () => { try { localStorage.removeItem("alias:dburl"); } catch (e) {} location.reload(); };
  return (
    <div style={{ marginTop: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "center",
        fontSize: 13, fontWeight: 700, color: useREST ? C.good : C.amber }}>
        <span style={{ width: 9, height: 9, borderRadius: 999, background: useREST ? C.good : C.amber }} />
        {useREST ? "Сервер подключён — играете по сети" : "Локальный режим — видите только себя"}
      </div>
      <div style={{ textAlign: "center", marginTop: 8 }}>
        <button onClick={() => setOpen(o => !o)} style={{ background: "none", border: "none",
          color: C.sub, fontWeight: 700, fontSize: 12.5, cursor: "pointer", textDecoration: "underline" }}>
          {open ? "Скрыть" : "Подключить синхронизацию"}
        </button>
      </div>
      {open && (
        <div style={{ ...card({ padding: 14 }), marginTop: 8 }}>
          <Label>Ссылка на Firebase Realtime Database</Label>
          <input value={val} onChange={(e) => setVal(e.target.value)}
            placeholder="https://ваш-проект-default-rtdb.firebaseio.com"
            style={{ ...inp(), height: 44, fontSize: 13 }} />
          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
            <button onClick={save} disabled={!ok}
              style={primaryBtn(ok, "linear-gradient(120deg," + TEAMS[0].color + "," + TEAMS[1].color + ")", true)}>
              Подключить
            </button>
            {useREST && <button onClick={clear} style={softBtn()}>Сбросить</button>}
          </div>
          <p style={{ color: C.faint, fontSize: 11.5, marginTop: 10, lineHeight: 1.55 }}>
            console.firebase.google.com → ваш проект → Realtime Database → скопируйте адрес вида
            https://…firebaseio.com. Эту же ссылку вставляет и партнёр. Чтобы не вводить каждый раз —
            впишите её в DATABASE_URL внутри файла (см. README).
          </p>
        </div>
      )}
    </div>
  );
}

/* ===== СИНХРОНИЗАЦИЯ ИЗ РАЗНЫХ ГОРОДОВ =====
   Вставьте сюда адрес вашей Firebase Realtime Database, например:
     const DATABASE_URL = "https://my-alias-default-rtdb.firebaseio.com";
   Пусто = локальный режим (только этот компьютер).
   Можно не трогать файл, а вставить ссылку прямо на стартовом экране. */
const DATABASE_URL = "https://allias-6fa5f-default-rtdb.firebaseio.com";

function _effUrl() {
  let u = DATABASE_URL || "";
  if (!u) { try { u = localStorage.getItem("alias:dburl") || ""; } catch (e) {} }
  return u.trim().replace(/\/+$/, "");
}
const DB = _effUrl();
const useREST = /^https?:\/\//i.test(DB);
const hasStore = useREST; // настоящая синхронизация по сети включена?

const _ls = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} },
  del(k) { try { localStorage.removeItem(k); } catch (e) {} },
};

async function _rget(key) {
  try {
    const r = await fetch(DB + "/" + encodeURIComponent(key) + ".json");
    if (!r.ok) return null;
    return await r.json();
  } catch (e) { return null; }
}
async function _rset(key, value) {
  try { await fetch(DB + "/" + encodeURIComponent(key) + ".json", { method: "PUT", body: JSON.stringify(value) }); }
  catch (e) {}
}
async function _rdel(key) {
  try { await fetch(DB + "/" + encodeURIComponent(key) + ".json", { method: "DELETE" }); }
  catch (e) {}
}

const store = {
  async get(key, shared = true) {
    if (!shared) return _ls.get("p:" + key);
    if (useREST) return await _rget(key);
    return _ls.get(key);
  },
  async set(key, value, shared = true) {
    if (!shared) { _ls.set("p:" + key, value); return; }
    if (useREST) { await _rset(key, value); return; }
    _ls.set(key, value);
  },
  async del(key, shared = true) {
    if (!shared) { _ls.del("p:" + key); return; }
    if (useREST) { await _rdel(key); return; }
    _ls.del(key);
  },
};

const kMeta = (r) => `alias:${r}:meta`;
const kLive = (r) => `alias:${r}:live`;
const kResults = (r) => `alias:${r}:results`;

/* ------------------------------------------------------------------ */
/*  Звук (Web Audio, без внешних файлов)                               */
/* ------------------------------------------------------------------ */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
  }
  if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function blip(freqs, type, dur, vol) {
  const ctx = ensureAudio();
  if (!ctx || vol <= 0) return;
  const now = ctx.currentTime;
  freqs.forEach(([f, t], i) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f, now + t);
    const peak = 0.16 * vol;
    g.gain.setValueAtTime(0.0001, now + t);
    g.gain.exponentialRampToValueAtTime(peak, now + t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, now + t + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(now + t); o.stop(now + t + dur + 0.02);
  });
}
const sound = {
  correct: (v) => blip([[587.33, 0], [880, 0.085]], "sine", 0.16, v),
  skip: (v) => blip([[300, 0], [196, 0.06]], "triangle", 0.16, v),
  tick: (v) => blip([[1320, 0]], "sine", 0.05, v * 0.5),
  win: (v) => blip([[523, 0], [659, 0.1], [784, 0.2], [1046, 0.32]], "sine", 0.3, v),
};

const uid = () => Math.random().toString(36).slice(2, 10);
const code4 = () => Array.from({ length: 4 }, () => "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random() * 32)]).join("");
function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}
function _extra(name) {
  try { const v = (typeof window !== "undefined") && window[name]; return Array.isArray(v) ? v : []; }
  catch (e) { return []; }
}
function allEasy() { return [...EASY, ..._extra("ALIAS_EASY")]; }
function allHard() { return [...HARD, ..._extra("ALIAS_HARD")]; }

function buildDeck(diff, used = []) {
  const base = diff === "easy" ? allEasy() : diff === "hard" ? allHard() : [...allEasy(), ...allHard()];
  const uniq = [...new Set(base)];
  const u = new Set(used);
  let avail = uniq.filter((w) => !u.has(w));
  if (avail.length < 25) avail = uniq; // прошли весь список — начинаем круг заново
  return shuffle(avail);
}

const NOW = () => Date.now();
const ACTIVE_MS = 22000; // считаем игрока онлайн

/* ================================================================== */
/*  Главный компонент                                                  */
/* ================================================================== */
function App() {
  const [me, setMe] = useState(null); // {id, nick}
  const [room, setRoom] = useState("");
  const [joined, setJoined] = useState(false);

  /* код комнаты из ссылки-приглашения (?room=КОД или #КОД) */
  const [linkRoom] = useState(() => {
    try {
      const u = new URL(window.location.href);
      let r = u.searchParams.get("room") || "";
      if (!r && u.hash) r = u.hash.replace(/^#/, "");
      r = (r || "").trim().toUpperCase().slice(0, 12);
      return /^[A-Z0-9]{1,12}$/.test(r) ? r : "";
    } catch (e) { return ""; }
  });

  const [vol, setVol] = useState(0.6);
  const [muted, setMuted] = useState(false);
  const effVol = muted ? 0 : vol;
  const effVolRef = useRef(effVol);
  useEffect(() => { effVolRef.current = effVol; }, [effVol]);

  const [remote, setRemote] = useState({ players: {}, meta: null, live: null, results: null });
  const remoteRef = useRef(remote);
  useEffect(() => { remoteRef.current = remote; }, [remote]);

  const meRef = useRef(me); useEffect(() => { meRef.current = me; }, [me]);
  const roomRef = useRef(room); useEffect(() => { roomRef.current = room; }, [room]);
  const joinedRef = useRef(joined); useEffect(() => { joinedRef.current = joined; }, [joined]);

  /* загрузка личных настроек */
  useEffect(() => {
    (async () => {
      const id = (await store.get("alias:identity", false)) || { id: uid(), nick: "" };
      const v = await store.get("alias:vol", false);
      if (v) { setVol(v.vol ?? 0.6); setMuted(v.muted ?? false); }
      setMe(id);
      await store.set("alias:identity", id, false);
    })();
  }, []);
  useEffect(() => { store.set("alias:vol", { vol, muted }, false); }, [vol, muted]);

  /* запись своего слота игрока */
  const updateMe = useCallback(async (patch) => {
    const r = roomRef.current, m = meRef.current;
    if (!r || !m) return;
    const players = (await store.get(kPlayers(r))) || {};
    const prev = players[m.id] || { id: m.id, team: null, ready: false, joinTs: NOW() };
    players[m.id] = { ...prev, ...patch, id: m.id, nick: m.nick, lastSeen: NOW() };
    await store.set(kPlayers(r), players);
    refresh();
  }, []);

  /* опрос состояния комнаты */
  const refresh = useCallback(async () => {
    const r = roomRef.current;
    if (!r || !joinedRef.current) return;
    const [players, meta, live, results] = await Promise.all([
      store.get(kPlayers(r)), store.get(kMeta(r)), store.get(kLive(r)), store.get(kResults(r)),
    ]);
    setRemote({ players: players || {}, meta, live, results });
  }, []);

  /* цикл опроса + хартбит + авто-хост + очистка ушедших */
  useEffect(() => {
    if (!joined) return;
    refresh();
    const poll = setInterval(refresh, 1500);
    const beat = setInterval(() => updateMe({}), 4000);
    const housekeep = setInterval(async () => {
      const r = roomRef.current, m = meRef.current;
      if (!r || !m) return;
      const players = (await store.get(kPlayers(r))) || {};
      const now = NOW();
      const active = Object.values(players).filter((p) => now - (p.lastSeen || 0) < 30000);
      // удалить давно ушедших
      let changed = false;
      Object.keys(players).forEach((id) => {
        if (now - (players[id].lastSeen || 0) > 30000) { delete players[id]; changed = true; }
      });
      if (changed) await store.set(kPlayers(r), players);
      // авто-назначение ведущего комнаты
      const meta = await store.get(kMeta(r));
      if (meta) {
        const hostActive = active.find((p) => p.id === meta.hostId);
        if (!hostActive && active.length) {
          const heir = active.slice().sort((a, b) => (a.joinTs || 0) - (b.joinTs || 0))[0];
          if (heir.id === m.id) await store.set(kMeta(r), { ...meta, hostId: m.id });
        }
      }
    }, 6000);
    return () => { clearInterval(poll); clearInterval(beat); clearInterval(housekeep); };
  }, [joined, refresh, updateMe]);

  /* вход в комнату */
  const join = useCallback(async (nick, roomCode) => {
    ensureAudio();
    const cleanNick = nick.trim().slice(0, 18) || "Игрок";
    const r = (roomCode.trim().toUpperCase() || "MAIN").slice(0, 12);
    const newMe = { ...meRef.current, nick: cleanNick };
    setMe(newMe); meRef.current = newMe;
    await store.set("alias:identity", newMe, false);
    setRoom(r); roomRef.current = r;

    let meta = await store.get(kMeta(r));
    if (!meta) {
      meta = {
        hostId: newMe.id, phase: "lobby",
        settings: { durationSec: 60, target: 30, difficulty: "easy" },
        scores: { 0: 0, 1: 0 }, currentTeam: 0, explainerIdx: { 0: 0, 1: 0 },
        round: 1, usedWords: [], winner: null, stats: { 0: 0, 1: 0 },
      };
      await store.set(kMeta(r), meta);
    }
    const players = (await store.get(kPlayers(r))) || {};
    players[newMe.id] = {
      id: newMe.id, nick: cleanNick, team: null, ready: false,
      joinTs: players[newMe.id]?.joinTs || NOW(), lastSeen: NOW(),
    };
    await store.set(kPlayers(r), players);
    setJoined(true); joinedRef.current = true;
    refresh();
  }, [refresh]);

  if (!me) return null;

  return (
    <div style={{ minHeight: "100vh", fontFamily: "'Manrope', ui-sans-serif, system-ui, -apple-system, sans-serif", color: C.ink }}>
      <Styles />
      <div style={{ position: "fixed", inset: 0, zIndex: -1, background:
        "radial-gradient(1100px 700px at 12% -8%, #F1ECF8 0%, rgba(241,236,248,0) 60%)," +
        "radial-gradient(1000px 700px at 100% 0%, #E6F2EF 0%, rgba(230,242,239,0) 55%)," +
        "linear-gradient(165deg, #ECE9F4 0%, #EBEFEE 52%, #F4EDE6 100%)" }} />
      <div className="zoom-layer">
        {!joined
          ? <Entry me={me} onJoin={join} linkRoom={linkRoom} />
          : <Game me={me} room={room} remote={remote} updateMe={updateMe} refresh={refresh}
              vol={vol} setVol={setVol} muted={muted} setMuted={setMuted} effVolRef={effVolRef}
              setMe={setMe} />}
      </div>
    </div>
  );
}

          )}

          <button disabled={!ok} onClick={() => onJoin(nick, rc)}
            style={primaryBtn(ok, `linear-gradient(120deg, ${TEAMS[0].color}, ${TEAMS[1].color})`)}
            onMouseDown={(e) => ok && (e.currentTarget.style.transform = "scale(0.98)")}
            onMouseUp={(e) => (e.currentTarget.style.transform = "")}>
            <LogIn size={19} /> Войти в лобби
          </button>
          {viaLink ? (
            <p style={{ textAlign: "center", color: C.faint, fontSize: 12.5, marginTop: 14, lineHeight: 1.5 }}>
              Вы попадёте в зал ожидания, где сможете выбрать команду.
            </p>
          ) : (
            <p style={{ textAlign: "center", color: C.faint, fontSize: 12.5, marginTop: 14, lineHeight: 1.5 }}>
              Все игроки сидят за своими экранами — устройство передавать не нужно.<br />
              Поделитесь кодом <b style={{ color: C.sub }}>{rc}</b>, чтобы играть из разных городов.
            </p>
          )}
        </div>
        {!viaLink && <SyncStatus />}
      </div>
    </div>
  );
}

/* ================================================================== */
/*  Игра (после входа)                                                 */
/* ================================================================== */
function Game({ me, room, remote, updateMe, refresh, vol, setVol, muted, setMuted, effVolRef, setMe }) {
  const { players, meta } = remote;
  const _arr = (v) => (Array.isArray(v) ? v : v && typeof v === "object" ? Object.values(v) : []);
  const live = remote.live ? { ...remote.live, played: _arr(remote.live.played), deck: _arr(remote.live.deck) } : null;
  const results = remote.results ? { ...remote.results, words: _arr(remote.results.words) } : null;
  const now = NOW();
  const active = useMemo(
    () => Object.values(players).filter((p) => now - (p.lastSeen || 0) < ACTIVE_MS),
    [players, now]
  );
  const sorted = useMemo(() => active.slice().sort((a, b) => (a.joinTs || 0) - (b.joinTs || 0)), [active]);
  const myP = players[me.id];
  const isHost = meta && meta.hostId === me.id;

  const teamPlayers = (t) => sorted.filter((p) => p.team === t);
  const spectators = sorted.filter((p) => p.team === null || p.team === undefined);

  const phase = meta?.phase || "lobby";

  const writeMeta = useCallback((patch) => store.set(kMeta(room), { ...remote.meta, ...patch }).then(refresh), [room, remote.meta, refresh]);

  /* ----- остановить игру и вернуть всех в лобби ----- */
  const stopGame = useCallback(async () => {
    const m = remote.meta;
    await store.set(kLive(room), null);
    await store.set(kResults(room), null);
    const ps = (await store.get(kPlayers(room))) || {};
    Object.keys(ps).forEach((id) => { ps[id] = { ...ps[id], ready: false }; });
    await store.set(kPlayers(room), ps);
    await store.set(kMeta(room), {
      ...m, phase: "lobby", scores: { 0: 0, 1: 0 }, stats: { 0: 0, 1: 0 },
      round: 1, currentTeam: 0, explainerIdx: { 0: 0, 1: 0 }, winner: null,
    });
    refresh();
  }, [room, remote.meta, refresh]);

  /* ----- запуск раунда ----- */
  const startRound = useCallback(async (teamIndex) => {
    const m = remote.meta;
    const arr = sorted.filter((p) => p.team === teamIndex);
    if (!arr.length) return;
    const idx = (m.explainerIdx[teamIndex] || 0) % arr.length;
    const explainerId = arr[idx].id;
    const deck = buildDeck(m.settings.difficulty, m.usedWords);
    const liveState = {
      round: m.round, team: teamIndex, explainerId, deck, idx: 0, played: [],
      startTs: NOW(), durationSec: m.settings.durationSec,
      paused: false, pauseStartTs: 0, pauseAccumMs: 0,
    };
    await store.set(kLive(room), liveState);
    await store.set(kResults(room), null);
    await store.set(kMeta(room), { ...m, phase: "playing", currentTeam: teamIndex });
    refresh();
  }, [room, remote.meta, sorted, refresh]);

  /* ----- начать матч из лобби: показываем экран раунда (старт жмёт объясняющий) ----- */
  const beginMatch = useCallback(async () => {
    const m = remote.meta;
    await store.set(kLive(room), null);
    await store.set(kResults(room), null);
    await store.set(kMeta(room), { ...m, phase: "roundstart", currentTeam: 0 });
    refresh();
  }, [room, remote.meta, refresh]);

  /* ----- перемешать игроков ----- */
  const shufflePlayers = useCallback(async () => {
    const all = shuffle(sorted);
    const next = { ...players };
    all.forEach((p, i) => { next[p.id] = { ...next[p.id], team: i % 2, ready: false }; });
    await store.set(kPlayers(room), next);
    refresh();
  }, [room, players, sorted, refresh]);

  /* ----- завершение раунда -> результаты ----- */
  const endRound = useCallback(async () => {
    const l = remote.live, m = remote.meta;
    if (!l) return;
    const played = Array.isArray(l.played) ? l.played : (l.played && typeof l.played === "object" ? Object.values(l.played) : []);
    const deck = Array.isArray(l.deck) ? l.deck : (l.deck && typeof l.deck === "object" ? Object.values(l.deck) : []);
    const words = played.map((p) => ({ w: p.w, val: p.r === "correct" ? 1 : -1 }));
    if (deck[l.idx]) words.push({ w: deck[l.idx], val: 0 }); // слово, оставшееся на экране
    const used = [...(m.usedWords || []), ...words.map((x) => x.w)].slice(-6000);
    await store.set(kResults(room), { round: l.round, team: l.team, words, ts: NOW() });
    await store.set(kMeta(room), { ...m, phase: "results", usedWords: used });
    refresh();
  }, [room, remote.live, remote.meta, refresh]);

  /* ----- подтверждение результатов ----- */
  const confirmResults = useCallback(async () => {
    const m = remote.meta, res = remote.results;
    if (!res) return;
    const rwords = Array.isArray(res.words) ? res.words : (res.words && typeof res.words === "object" ? Object.values(res.words) : []);
    const sum = rwords.reduce((a, x) => a + x.val, 0);
    const guessed = rwords.filter((x) => x.val === 1).length;
    const scores = { ...m.scores, [res.team]: (m.scores[res.team] || 0) + sum };
    const stats = { ...m.stats, [res.team]: (m.stats[res.team] || 0) + guessed };
    const explainerIdx = { ...m.explainerIdx, [res.team]: (m.explainerIdx[res.team] || 0) + 1 };
    const target = m.settings.target;
    let phase = "roundstart", winner = null;
    if (scores[0] >= target || scores[1] >= target) {
      phase = "victory";
      winner = scores[0] === scores[1] ? (res.team) : (scores[0] > scores[1] ? 0 : 1);
    }
    await store.set(kMeta(room), {
      ...m, scores, stats, explainerIdx, round: m.round + 1,
      currentTeam: 1 - res.team, phase, winner,
    });
    refresh();
  }, [room, remote.meta, remote.results, refresh]);

  /* подсчёт «вживую» для табло */
  const liveScore = useMemo(() => {
    if (!live) return null;
    return live.played.reduce((a, p) => a + (p.r === "correct" ? 1 : -1), 0);
  }, [live]);

  return (
    <div style={{ maxWidth: 1180, margin: "0 auto", padding: "16px 16px 60px" }}>
      <TopBar me={me} room={room} myP={myP} isHost={isHost} setMe={setMe} updateMe={updateMe}
        vol={vol} setVol={setVol} muted={muted} setMuted={setMuted} phase={phase} onStop={stopGame} />

      {!meta ? (
        <div style={{ ...card({ padding: 40 }), marginTop: 18, textAlign: "center", color: C.sub }}>
          <div className="spinner" style={{ margin: "0 auto 14px" }} />
          Подключаемся к комнате…
        </div>
      ) : (
        <>
          <Scoreboard meta={meta} teamPlayers={teamPlayers} live={live} liveScore={liveScore} phase={phase} />

          <div style={{ height: 18 }} />

          {phase === "lobby" && (
            <Lobby me={me} meta={meta} sorted={sorted} teamPlayers={teamPlayers} spectators={spectators}
              isHost={isHost} updateMe={updateMe} writeMeta={writeMeta} shufflePlayers={shufflePlayers}
              beginMatch={beginMatch} />
          )}
          {phase === "roundstart" && (
            <RoundStart me={me} meta={meta} teamPlayers={teamPlayers} isHost={isHost} startRound={startRound} />
          )}
          {phase === "playing" && (live
            ? <PlayScreen me={me} meta={meta} live={live} room={room} refresh={refresh}
                effVolRef={effVolRef} endRound={endRound} isHost={isHost} players={players} />
            : <WaitNote text="Готовим раунд…" />)}
          {phase === "results" && (results
            ? <ResultsScreen me={me} meta={meta} results={results} room={room} refresh={refresh}
                isHost={isHost} live={live} confirmResults={confirmResults} />
            : <WaitNote text="Считаем результаты…" />)}
          {phase === "victory" && (
            <Victory meta={meta} isHost={isHost} writeMeta={writeMeta} effVolRef={effVolRef} />
          )}
        </>
      )}
    </div>
  );
}

function WaitNote({ text }) {
  return (
    <div style={{ ...card({ padding: 32 }), textAlign: "center", color: C.sub }}>
      <div className="spinner" style={{ margin: "0 auto 12px" }} />{text}
    </div>
  );
}

/* ================================================================== */
/*  Верхняя панель                                                     */
/* ================================================================== */
function TopBar({ me, room, myP, isHost, setMe, updateMe, vol, setVol, muted, setMuted, phase, onStop }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(me.nick);
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);
  const [askStop, setAskStop] = useState(false);

  const saveNick = async () => {
    const n = val.trim().slice(0, 18) || me.nick;
    const nm = { ...me, nick: n };
    setMe(nm);
    await store.set("alias:identity", nm, false);
    await updateMe({ nick: n });
    setEditing(false);
  };
  const copy = () => {
    try { navigator.clipboard.writeText(room); } catch {}
    setCopied(true); setTimeout(() => setCopied(false), 1400);
  };
  const lobbyLink = () => {
    try {
      const u = new URL(window.location.href);
      u.hash = "";
      u.search = "?room=" + encodeURIComponent(room);
      return u.toString();
    } catch (e) { return "?room=" + room; }
  };
  const share = async () => {
    const url = lobbyLink();
    if (navigator.share) {
      try { await navigator.share({ title: "Alias — заходи в лобби", text: "Присоединяйся к моей игре в Alias", url }); return; }
      catch (e) { return; }
    }
    try { await navigator.clipboard.writeText(url); } catch (e) {}
    setShared(true); setTimeout(() => setShared(false), 1800);
  };

  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 26, fontWeight: 800, letterSpacing: -1,
          background: `linear-gradient(120deg, ${TEAMS[0].color}, ${TEAMS[1].color})`,
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Alias</span>
        <button onClick={copy} style={{ ...pill(), gap: 7 }} title="Скопировать код комнаты">
          <Hash size={14} style={{ color: C.faint }} />
          <b style={{ letterSpacing: 1.5, fontWeight: 700 }}>{room}</b>
          {copied ? <Check size={14} style={{ color: C.good }} /> : <Copy size={13} style={{ color: C.faint }} />}
        </button>
        <button onClick={share} style={{ ...pill(), gap: 7, color: TEAMS[0].color }} title="Поделиться ссылкой на лобби">
          <Link2 size={14} />
          <span style={{ fontWeight: 700, fontSize: 13 }}>{shared ? "Ссылка скопирована" : "Поделиться"}</span>
        </button>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        {isHost && phase !== "lobby" && (
          askStop ? (
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.sub }}>В лобби?</span>
              <button onClick={() => { setAskStop(false); onStop(); }} style={iconBtn(C.bad)} title="Да, остановить"><Check size={16} /></button>
              <button onClick={() => setAskStop(false)} style={iconBtn()} title="Отмена"><X size={16} /></button>
            </div>
          ) : (
            <button onClick={() => setAskStop(true)} style={{ ...pill(), gap: 7, color: C.bad }}
              title="Остановить игру и вернуть всех в лобби">
              <Square size={14} /> <span style={{ fontWeight: 700, fontSize: 13 }}>Стоп</span>
            </button>
          )
        )}
        <VolumeControl vol={vol} setVol={setVol} muted={muted} setMuted={setMuted} />
        {editing ? (
          <div style={{ display: "flex", gap: 6 }}>
            <input autoFocus value={val} maxLength={18} onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") saveNick(); if (e.key === "Escape") setEditing(false); }}
              style={{ ...inp(), height: 40, width: 150, padding: "0 12px" }} />
            <button onClick={saveNick} style={iconBtn(TEAMS[0].color)}><Check size={18} /></button>
          </div>
        ) : (
          <button onClick={() => { setVal(me.nick); setEditing(true); }} style={{ ...pill(), gap: 8 }}>
            {isHost && <Crown size={14} style={{ color: C.amber }} />}
            <span style={{ fontWeight: 700, maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{me.nick}</span>
            <Pencil size={13} style={{ color: C.faint }} />
          </button>
        )}
      </div>
    </div>
  );
}

function VolumeControl({ vol, setVol, muted, setMuted }) {
  const [open, setOpen] = useState(false);
  const Icon = muted || vol === 0 ? VolumeX : vol < 0.5 ? Volume1 : Volume2;
  return (
    <div style={{ position: "relative" }}>
      <button onClick={() => setOpen((o) => !o)} style={iconBtn(open ? TEAMS[0].color : undefined)} title="Громкость">
        <Icon size={18} />
      </button>
      {open && (
        <div className="fade-in" style={{ position: "absolute", right: 0, top: 48, zIndex: 30, ...card({ padding: 14 }), width: 200 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.sub }}>Громкость</span>
            <button onClick={() => setMuted((m) => !m)} style={{
              fontSize: 12, fontWeight: 700, padding: "4px 10px", borderRadius: 999, border: "none", cursor: "pointer",
              background: muted ? C.badBg : "rgba(43,40,64,0.05)", color: muted ? C.bad : C.sub }}>
              {muted ? "Вкл. звук" : "Выключить"}
            </button>
          </div>
          <input type="range" min={0} max={1} step={0.01} value={muted ? 0 : vol}
            onChange={(e) => { setVol(parseFloat(e.target.value)); setMuted(false); }}
            style={{ width: "100%", accentColor: TEAMS[0].color }} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, color: C.faint }}>
            <span>Тихо</span><span>{Math.round((muted ? 0 : vol) * 100)}%</span><span>Громко</span>
          </div>
        </div>
      )}
    </div>
  );
}

/* ================================================================== */
/*  Табло счёта                                                        */
/* ================================================================== */
function Scoreboard({ meta, teamPlayers, live, liveScore, phase }) {
  const target = meta.settings.target;
  const curExp = (t) => {
    const arr = teamPlayers(t);
    if (!arr.length) return null;
    const i = (meta.explainerIdx[t] || 0) % arr.length;
    return arr[i];
  };
  return (
    <div style={{ ...card({ padding: 0 }), marginTop: 16, overflow: "hidden" }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr" }}>
        {[0, 1].map((t) => {
          const T = TEAMS[t];
          const isCur = phase !== "lobby" && meta.currentTeam === t;
          const exp = curExp(t);
          const liveDelta = phase === "playing" && live && live.team === t ? liveScore : 0;
          return (
            <div key={t} style={{ padding: "16px 18px", background: isCur ? T.soft : "transparent",
              transition: "background .35s", borderLeft: t === 1 ? `1px solid ${C.line}` : "none",
              order: t === 0 ? 0 : 2 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: t === 1 ? "flex-end" : "flex-start" }}>
                <span style={{ width: 10, height: 10, borderRadius: 999, background: T.color }} />
                <span style={{ fontWeight: 700, fontSize: 14, color: T.color }}>{T.name}</span>
                {isCur && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 7px", borderRadius: 999, background: T.color, color: "#fff" }}>ход</span>}
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginTop: 4, justifyContent: t === 1 ? "flex-end" : "flex-start" }}>
                <span style={{ fontSize: 40, fontWeight: 800, letterSpacing: -1, color: C.ink }}>{meta.scores[t] || 0}</span>
                {liveDelta !== 0 && (
                  <span style={{ fontSize: 16, fontWeight: 700, color: liveDelta > 0 ? C.good : C.bad }}>
                    {liveDelta > 0 ? "+" : ""}{liveDelta}
                  </span>
                )}
                <span style={{ fontSize: 13, color: C.faint }}>/ {target}</span>
              </div>
              {exp && (
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, fontSize: 12.5, color: C.sub, justifyContent: t === 1 ? "flex-end" : "flex-start" }}>
                  <Eye size={12} style={{ color: T.color }} /> объясняет: <b style={{ color: C.ink }}>{exp.nick}</b>
                </div>
              )}
            </div>
          );
        })}
        <div style={{ order: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
          padding: "0 14px", minWidth: 96, background: "rgba(43,40,64,0.025)" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: C.faint, textTransform: "uppercase", letterSpacing: 1 }}>Раунд</span>
          <span style={{ fontSize: 28, fontWeight: 800, color: C.ink }}>{meta.round}</span>
        </div>
      </div>
    </div>
  );
}

/* ================================================================== */
/*  Лобби                                                              */
/* ================================================================== */
function Lobby({ me, meta, sorted, teamPlayers, spectators, isHost, updateMe, writeMeta, shufflePlayers, beginMatch }) {
  const myP = sorted.find((p) => p.id === me.id);
  const teamed = sorted.filter((p) => p.team === 0 || p.team === 1);
  const bothHave = teamPlayers(0).length >= 1 && teamPlayers(1).length >= 1;
  const allReady = teamed.length >= 2 && teamed.every((p) => p.ready);
  const canStart = bothHave && allReady;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) 320px", gap: 18, alignItems: "start" }} className="lobby-grid">
      {/* Команды */}
      <div style={{ display: "grid", gap: 16 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }} className="teams-grid">
          {[0, 1].map((t) => (
            <TeamPanel key={t} t={t} players={teamPlayers(t)} me={me} myP={myP} updateMe={updateMe} />
          ))}
        </div>

        {myP && (myP.team === 0 || myP.team === 1) && (
          <button onClick={() => updateMe({ ready: !myP.ready })}
            style={{
              ...bigBtn(),
              background: myP.ready ? C.goodBg : C.glassSolid,
              color: myP.ready ? C.goodDeep : C.ink,
              border: `1.5px solid ${myP.ready ? "rgba(16,185,129,0.4)" : C.line}`,
              boxShadow: myP.ready ? "0 0 0 4px rgba(16,185,129,0.10)" : C.shadowSoft,
            }}>
            {myP.ready ? <><Check size={20} /> Вы готовы — нажмите, чтобы отменить</> : <>Я готов играть · READY</>}
          </button>
        )}

        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          <button onClick={shufflePlayers} style={{ ...softBtn(), flex: 1 }}>
            <Shuffle size={17} /> Перемешать игроков
          </button>
          {isHost ? (
            <button disabled={!canStart} onClick={beginMatch}
              style={primaryBtn(canStart, `linear-gradient(120deg, ${TEAMS[0].color}, ${TEAMS[1].color})`, true)}>
              <Play size={18} /> {canStart ? "Начать игру" : "Ждём готовности всех"}
            </button>
          ) : (
            <div style={{ ...softBtn(), flex: 2, cursor: "default", color: C.sub }}>
              <Crown size={16} style={{ color: C.amber }} /> Игру запускает ведущий комнаты
            </div>
          )}
        </div>
        {!canStart && (
          <p style={{ color: C.faint, fontSize: 12.5, textAlign: "center", marginTop: -4 }}>
            Старт доступен, когда в обеих командах есть игроки и все нажали <b style={{ color: C.good }}>READY</b>.
          </p>
        )}

        {isHost && <Settings meta={meta} writeMeta={writeMeta} />}
        {!isHost && <SettingsView meta={meta} />}
      </div>

      {/* Зал ожидания (спектаторы) — справа сверху */}
      <div style={{ ...card({ padding: 16 }), position: "sticky", top: 12 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
          <Users size={16} style={{ color: C.sub }} />
          <h3 style={{ fontSize: 14, fontWeight: 700, color: C.ink, margin: 0 }}>Зал ожидания</h3>
          <span style={{ marginLeft: "auto", fontSize: 12, fontWeight: 700, color: C.faint }}>{spectators.length}</span>
        </div>
        <p style={{ fontSize: 12, color: C.faint, margin: "0 0 12px" }}>
          Новые игроки появляются здесь. Выберите команду слева, чтобы присоединиться.
        </p>
        {spectators.length === 0 ? (
          <div style={{ textAlign: "center", padding: "18px 0", color: C.faint, fontSize: 13 }}>
            Все за столами 🎉
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {spectators.map((p) => (
              <div key={p.id} className="pop-in" style={{ display: "flex", alignItems: "center", gap: 10,
                padding: "9px 12px", borderRadius: 14, background: "rgba(43,40,64,0.04)" }}>
                <Avatar nick={p.nick} />
                <span style={{ fontWeight: 600, fontSize: 14, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {p.nick}{p.id === me.id && <span style={{ color: C.faint, fontWeight: 500 }}> · вы</span>}
                </span>
              </div>
            ))}
          </div>
        )}
        {myP && myP.team !== null && (
          <button onClick={() => updateMe({ team: null, ready: false })}
            style={{ ...softBtn(), width: "100%", marginTop: 12, fontSize: 13, padding: "10px" }}>
            Выйти в зал ожидания
          </button>
        )}
      </div>
    </div>
  );
}

function TeamPanel({ t, players, me, myP, updateMe }) {
  const T = TEAMS[t];
  const mine = myP && myP.team === t;
  return (
    <div style={{ ...card({ padding: 16 }), borderTop: `3px solid ${T.color}` }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <span style={{ width: 11, height: 11, borderRadius: 999, background: T.color }} />
        <h3 style={{ fontSize: 16, fontWeight: 800, color: T.color, margin: 0 }}>{T.name}</h3>
        <span style={{ marginLeft: "auto", fontSize: 12, fontWeight: 700, color: C.faint }}>{players.length}</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, minHeight: 60 }}>
        {players.length === 0 && (
          <div style={{ textAlign: "center", padding: "14px 0", color: C.faint, fontSize: 13, border: `1.5px dashed ${C.line}`, borderRadius: 14 }}>
            Пока пусто
          </div>
        )}
        {players.map((p) => (
          <div key={p.id} className="pop-in" style={{
            display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 14,
            background: p.ready ? C.goodBg : "rgba(43,40,64,0.035)",
            border: p.ready ? "1px solid rgba(16,185,129,0.35)" : "1px solid transparent",
            transition: "all .3s" }}>
            <Avatar nick={p.nick} color={p.ready ? C.good : T.color} />
            <span style={{ fontWeight: 700, fontSize: 14, flex: 1, color: p.ready ? C.goodDeep : C.ink,
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
              {p.nick}{p.id === me.id && <span style={{ color: C.faint, fontWeight: 500 }}> · вы</span>}
            </span>
            {p.ready
              ? <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11.5, fontWeight: 700, color: C.good }}><Check size={14} /> готов</span>
              : <span style={{ fontSize: 11.5, color: C.faint }}>не готов</span>}
          </div>
        ))}
      </div>
      {!mine && (
        <button onClick={() => updateMe({ team: t, ready: false })}
          style={{ width: "100%", marginTop: 12, padding: "11px", borderRadius: 14, border: "none", cursor: "pointer",
            background: T.soft, color: T.color, fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center",
            justifyContent: "center", gap: 8, transition: "transform .15s" }}
          onMouseEnter={(e) => (e.currentTarget.style.transform = "translateY(-1px)")}
          onMouseLeave={(e) => (e.currentTarget.style.transform = "")}>
          <ArrowRight size={16} /> {myP && myP.team !== null ? "Перейти сюда" : "Присоединиться"}
        </button>
      )}
    </div>
  );
}

      </h3>
      <SetRow icon={<Clock size={15} />} label="Время раунда">

/* ================================================================== */
/*  Старт раунда (между раундами)                                      */
/* ================================================================== */
function RoundStart({ me, meta, teamPlayers, isHost, startRound }) {
  const t = meta.currentTeam;
  const T = TEAMS[t];
  const arr = teamPlayers(t);
  const exp = arr.length ? arr[(meta.explainerIdx[t] || 0) % arr.length] : null;
  const amExplainer = exp && me && exp.id === me.id;
  return (
    <div className="fade-up" style={{ ...card({ padding: 36 }), textAlign: "center", maxWidth: 560, margin: "20px auto" }}>
      <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: C.faint }}>
        Раунд {meta.round}
      </span>
      <div style={{ margin: "16px 0", display: "inline-flex", alignItems: "center", gap: 10, padding: "8px 18px",
        borderRadius: 999, background: T.soft }}>
        <span style={{ width: 10, height: 10, borderRadius: 999, background: T.color }} />
        <b style={{ color: T.color, fontSize: 15 }}>Ход команды «{T.name}»</b>
      </div>
      <p style={{ color: C.sub, fontSize: 16, margin: "10px 0 4px" }}>Объясняет</p>
      <h2 style={{ fontSize: 38, fontWeight: 800, letterSpacing: -1, margin: "0 0 24px", color: C.ink }}>
        {exp ? exp.nick : "—"}
      </h2>
      {amExplainer ? (
        <>
          <button onClick={() => startRound(t)} style={primaryBtn(!!exp, `linear-gradient(120deg, ${T.color}, ${TEAMS[1 - t].color})`, true)}>
            <Play size={19} /> Начать раунд
          </button>
          <p style={{ color: C.faint, fontSize: 13, marginTop: 12 }}>
            Объясняете вы — нажмите «Начать раунд», когда будете готовы. Слова появятся только у вас.
          </p>
        </>
      ) : (
        <p style={{ color: C.faint, fontSize: 14 }}>
          Ждём, пока <b style={{ color: C.sub }}>{exp ? exp.nick : "игрок"}</b> начнёт раунд…
        </p>
      )}
    </div>
  );
}

/* ================================================================== */
/*  Игровой экран                                                      */
/* ================================================================== */
function PlayScreen({ me, meta, live, room, refresh, effVolRef, endRound, isHost, players }) {
  const T = TEAMS[live.team];
  const amExplainer = live.explainerId === me.id;
  const explainer = Object.values(players).find((p) => p.id === live.explainerId);

  /* локальный таймер */
  const [remain, setRemain] = useState(live.durationSec);
  const endedRef = useRef(false);
  const lastTickRef = useRef(99);
  useEffect(() => { endedRef.current = false; }, [live.round, live.team]);

  useEffect(() => {
    const calc = () => {
      const now = NOW();
      const pausedExtra = live.paused ? now - (live.pauseStartTs || now) : 0;
      const elapsed = now - live.startTs - (live.pauseAccumMs || 0) - pausedExtra;
      const left = Math.max(0, live.durationSec - elapsed / 1000);
      setRemain(left);
      // тиканье последних секунд
      const sec = Math.ceil(left);
      if (left > 0 && left <= 10 && sec !== lastTickRef.current) {
        lastTickRef.current = sec;
        sound.tick(effVolRef.current);
      }
      if (left <= 0 && !endedRef.current && (amExplainer || isHost)) {
        endedRef.current = true;
        endRound();
      }
    };
    calc();
    const id = setInterval(calc, 200);
    return () => clearInterval(id);
  }, [live, amExplainer, isHost, endRound, effVolRef]);

  /* действия ведущего со словом */
  const [flash, setFlash] = useState(null);
  const flashRef = useRef(null);
  const answer = async (correct) => {
    if (!amExplainer || live.paused) return;
    const word = live.deck[live.idx];
    const played = [...live.played, { w: word, r: correct ? "correct" : "skip" }];
    let idx = live.idx + 1;
    let deck = live.deck;
    if (idx >= deck.length) deck = [...deck, ...buildDeck(meta.settings.difficulty, played.map((p) => p.w))];
    if (correct) sound.correct(effVolRef.current); else sound.skip(effVolRef.current);
    setFlash(correct ? "correct" : "skip");
    clearTimeout(flashRef.current);
    flashRef.current = setTimeout(() => setFlash(null), 420);
    await store.set(kLive(room), { ...live, deck, idx, played });
    refresh();
  };

  const togglePause = async () => {
    if (!(amExplainer || isHost)) return;
    const now = NOW();
    if (live.paused) {
      const add = now - (live.pauseStartTs || now);
      await store.set(kLive(room), { ...live, paused: false, pauseStartTs: 0, pauseAccumMs: (live.pauseAccumMs || 0) + add });
    } else {
      await store.set(kLive(room), { ...live, paused: true, pauseStartTs: now });
    }
    refresh();
  };

  const word = live.deck[live.idx];
  const last10 = remain <= 10 && remain > 0;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) 300px", gap: 18, alignItems: "start" }} className="play-grid">
      <div style={{ display: "grid", gap: 16 }}>
        {/* Таймер */}
        <TimerBar remain={remain} total={live.durationSec} last10={last10} paused={live.paused} color={T.color} />

        {/* Карточка слова */}
        {amExplainer ? (
          <div style={{ position: "relative" }}>
            <div className={flash === "correct" ? "flash-correct" : flash === "skip" ? "flash-skip" : ""}
              style={{
                ...card({ padding: 0 }),
                position: "relative", overflow: "hidden",
                minHeight: 230, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                borderTop: `3px solid ${T.color}`,
              }}>
              <span style={{ position: "absolute", top: 16, left: 0, right: 0, textAlign: "center",
                fontSize: 11.5, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: C.faint }}>
                Объясняете вы · слово видите только вы
              </span>
              {live.paused ? (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, color: C.sub }}>
                  <Pause size={40} style={{ opacity: 0.5 }} />
                  <b style={{ fontSize: 18 }}>Пауза</b>
                </div>
              ) : (
                <div key={word + live.idx} className="word-in" style={{
                  fontSize: "clamp(34px, 7vw, 60px)", fontWeight: 800, letterSpacing: -1.5, color: C.ink,
                  textAlign: "center", padding: "0 24px", lineHeight: 1.05 }}>
                  {word}
                </div>
              )}
            </div>
            {/* Кнопки ответа — фиксированы */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>
              <button onClick={() => answer(true)} disabled={live.paused} style={answerBtn(C.good, live.paused)}>
                <Check size={26} strokeWidth={2.5} /> Угадали
              </button>
              <button onClick={() => answer(false)} disabled={live.paused} style={answerBtn(C.bad, live.paused)}>
                <X size={26} strokeWidth={2.5} /> Пропуск
              </button>
            </div>
            {/* Управление раундом */}
            <div style={{ display: "flex", gap: 10, marginTop: 14, justifyContent: "center" }}>
              <button onClick={togglePause} style={softBtn()}>
                {live.paused ? <><Play size={16} /> Продолжить</> : <><Pause size={16} /> Пауза</>}
              </button>
              <button onClick={endRound} style={{ ...softBtn(), color: C.bad }}>
                <Flag size={16} /> Завершить раунд
              </button>
            </div>
          </div>
        ) : (
          <div style={{ ...card({ padding: 36 }), minHeight: 230, display: "flex", flexDirection: "column",
            alignItems: "center", justifyContent: "center", textAlign: "center", borderTop: `3px solid ${T.color}` }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "8px 16px", borderRadius: 999, background: T.soft, marginBottom: 14 }}>
              <span style={{ width: 9, height: 9, borderRadius: 999, background: T.color }} />
              <b style={{ color: T.color, fontSize: 14 }}>{T.name}</b>
            </div>
            <h2 style={{ fontSize: 28, fontWeight: 800, letterSpacing: -1, margin: 0, color: C.ink }}>
              {explainer ? explainer.nick : "Игрок"} объясняет
            </h2>
            <p style={{ color: C.sub, fontSize: 15, marginTop: 8 }}>
              {live.paused ? "Сейчас пауза." : "Слово видит только ведущий. Следите за списком справа."}
            </p>
            {isHost && (
              <div style={{ display: "flex", gap: 10, marginTop: 18 }}>
                <button onClick={togglePause} style={softBtn()}>
                  {live.paused ? <><Play size={16} /> Продолжить</> : <><Pause size={16} /> Пауза</>}
                </button>
                <button onClick={endRound} style={{ ...softBtn(), color: C.bad }}>
                  <Flag size={16} /> Завершить
                </button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* История слов — видна всем */}
      <WordHistory played={live.played} />
    </div>
  );
}

function TimerBar({ remain, total, last10, paused, color }) {
  const pct = Math.max(0, Math.min(100, (remain / total) * 100));
  const sec = Math.ceil(remain);
  const display = `${Math.floor(sec / 60)}:${String(sec % 60).padStart(2, "0")}`;
  const barColor = last10 ? C.bad : color;
  return (
    <div style={card({ padding: "14px 18px" })}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.faint, textTransform: "uppercase", letterSpacing: 1 }}>
          {paused ? "Пауза" : "Осталось"}
        </span>
        <span className={last10 && !paused ? "timer-pulse" : ""}
          style={{ fontSize: 28, fontWeight: 800, letterSpacing: -0.5, color: barColor, fontVariantNumeric: "tabular-nums" }}>
          {display}
        </span>
      </div>
      <div style={{ height: 8, borderRadius: 999, background: "rgba(43,40,64,0.07)", overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${pct}%`, borderRadius: 999, background: barColor,
          transition: "width .2s linear, background .3s", opacity: paused ? 0.5 : 1 }} />
      </div>
    </div>
  );
}

function WordHistory({ played }) {
  const list = [...played].reverse();
  const guessed = played.filter((p) => p.r === "correct").length;
  return (
    <div style={{ ...card({ padding: 16 }), position: "sticky", top: 12, maxHeight: "70vh", display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
        <h3 style={{ fontSize: 14, fontWeight: 700, margin: 0, color: C.ink }}>Сыгранные слова</h3>
        <span style={{ marginLeft: "auto", fontSize: 12, fontWeight: 700, color: C.good }}>+{guessed}</span>
        <span style={{ fontSize: 12, fontWeight: 700, color: C.bad }}>−{played.length - guessed}</span>
      </div>
      <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 7, paddingRight: 2 }}>
        {list.length === 0 && (
          <p style={{ color: C.faint, fontSize: 13, textAlign: "center", padding: "20px 0" }}>Слова появятся здесь по ходу раунда.</p>
        )}
        {list.map((p, i) => {
          const good = p.r === "correct";
          return (
            <div key={list.length - i} className="slide-in" style={{
              display: "flex", alignItems: "center", gap: 9, padding: "9px 12px", borderRadius: 12,
              background: good ? C.goodBg : C.badBg }}>
              <span style={{ width: 20, height: 20, borderRadius: 999, background: good ? C.good : C.bad,
                display: "grid", placeItems: "center", flexShrink: 0 }}>
                {good ? <Check size={13} color="#fff" strokeWidth={3} /> : <X size={13} color="#fff" strokeWidth={3} />}
              </span>
              <span style={{ fontWeight: 600, fontSize: 14, color: C.ink, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.w}</span>
              <span style={{ marginLeft: "auto", fontSize: 13, fontWeight: 800, color: good ? C.good : C.bad }}>{good ? "+1" : "−1"}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ================================================================== */
/*  Экран результатов раунда                                           */
/* ================================================================== */
function ResultsScreen({ me, meta, results, room, refresh, isHost, live, confirmResults }) {
  const T = TEAMS[results.team];
  const amExplainer = live && live.explainerId === me.id;
  const canConfirm = isHost || amExplainer;

  const setVal = async (i, val) => {
    const cur = (await store.get(kResults(room))) || results;
    const cw = Array.isArray(cur.words) ? cur.words : (cur.words && typeof cur.words === "object" ? Object.values(cur.words) : []);
    const words = cw.map((w, j) => (j === i ? { ...w, val } : w));
    await store.set(kResults(room), { ...cur, words, ts: NOW() });
    refresh();
  };

  const sum = results.words.reduce((a, x) => a + x.val, 0);
  const newScore = (meta.scores[results.team] || 0) + sum;

  return (
    <div className="fade-up" style={{ ...card({ padding: 22 }), maxWidth: 760, margin: "10px auto" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 4 }}>
        <h2 style={{ fontSize: 22, fontWeight: 800, margin: 0, color: C.ink }}>Итоги раунда {results.round}</h2>
        <div style={{ display: "inline-flex", alignItems: "center", gap: 7, padding: "5px 12px", borderRadius: 999, background: T.soft }}>
          <span style={{ width: 8, height: 8, borderRadius: 999, background: T.color }} />
          <b style={{ color: T.color, fontSize: 13 }}>{T.name}</b>
        </div>
        <div style={{ marginLeft: "auto", textAlign: "right" }}>
          <div style={{ fontSize: 12, color: C.faint, fontWeight: 600 }}>за раунд</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: sum >= 0 ? C.good : C.bad }}>{sum >= 0 ? "+" : ""}{sum}</div>
        </div>
      </div>
      <p style={{ color: C.sub, fontSize: 13.5, margin: "0 0 16px" }}>
        Любой игрок (в том числе соперники) может поправить оценку — изменения видят все. Счёт пересчитывается автоматически.
      </p>

      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {results.words.map((w, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 14,
            background: "rgba(43,40,64,0.03)" }}>
            <span style={{ fontWeight: 700, fontSize: 15, color: C.ink, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.w}</span>
            <SegScore value={w.val} onChange={(v) => setVal(i, v)} />
          </div>
        ))}
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 14, marginTop: 18, flexWrap: "wrap" }}>
        <div style={{ fontSize: 14, color: C.sub }}>
          Счёт «{T.name}»: <b style={{ color: C.ink }}>{meta.scores[results.team] || 0}</b>
          <ArrowRight size={14} style={{ verticalAlign: -2, margin: "0 4px", color: C.faint }} />
          <b style={{ color: T.color, fontSize: 16 }}>{newScore}</b>
        </div>
        {canConfirm ? (
          <button onClick={confirmResults} style={{ ...primaryBtn(true, `linear-gradient(120deg, ${T.color}, ${TEAMS[1 - results.team].color})`, true), marginLeft: "auto", marginTop: 0, width: "auto", padding: "13px 24px" }}>
            <Check size={18} /> Подтвердить и продолжить
          </button>
        ) : (
          <span style={{ marginLeft: "auto", fontSize: 13, color: C.faint }}>Ждём подтверждения ведущего…</span>
        )}
      </div>
    </div>
  );
}

function SegScore({ value, onChange }) {
  const opts = [
    { v: -1, color: C.bad, bg: C.badBg, label: "−1" },
    { v: 0, color: C.sub, bg: "rgba(43,40,64,0.06)", label: "0" },
    { v: 1, color: C.good, bg: C.goodBg, label: "+1" },
  ];
  return (
    <div style={{ display: "flex", borderRadius: 12, overflow: "hidden", border: `1px solid ${C.line}` }}>
      {opts.map((o) => {
        const on = value === o.v;
        return (
          <button key={o.v} onClick={() => onChange(o.v)} style={{
            width: 46, height: 38, border: "none", cursor: "pointer", fontWeight: 800, fontSize: 14,
            background: on ? o.bg : "transparent", color: on ? o.color : C.faint,
            transition: "all .18s", borderRight: o.v !== 1 ? `1px solid ${C.line}` : "none",
            boxShadow: on ? `inset 0 0 0 1.5px ${o.color}` : "none" }}>
            {o.label}
          </button>
        );
      })}
    </div>
  );
}

/* ================================================================== */
/*  Экран победы                                                       */
/* ================================================================== */
function Victory({ meta, isHost, writeMeta, effVolRef }) {
  const w = meta.winner ?? (meta.scores[0] >= meta.scores[1] ? 0 : 1);
  const T = TEAMS[w];
  const L = TEAMS[1 - w];
  useEffect(() => { sound.win(effVolRef.current); }, []);

  const playAgain = () => writeMeta({
    phase: "lobby", scores: { 0: 0, 1: 0 }, stats: { 0: 0, 1: 0 },
    round: 1, currentTeam: 0, explainerIdx: { 0: 0, 1: 0 }, winner: null,
  });

  return (
    <div className="fade-up" style={{ position: "relative", ...card({ padding: 40 }), maxWidth: 620, margin: "20px auto", textAlign: "center", overflow: "hidden" }}>
      <Confetti color={T.color} color2={L.color} />
      <div style={{ position: "relative" }}>
        <div style={{ width: 84, height: 84, borderRadius: 999, margin: "0 auto 18px", display: "grid", placeItems: "center",
          background: T.soft, boxShadow: `0 0 0 8px ${T.soft}` }}>
          <Trophy size={42} style={{ color: T.color }} />
        </div>
        <span style={{ fontSize: 13, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: C.faint }}>Победа</span>
        <h1 style={{ fontSize: 48, fontWeight: 800, letterSpacing: -2, margin: "6px 0 4px", color: T.color }}>{T.name}</h1>
        <p style={{ color: C.sub, fontSize: 16, marginBottom: 26 }}>Команда первой добралась до {meta.settings.target} очков 🎉</p>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 26 }}>
          {[w, 1 - w].map((t) => (
            <div key={t} style={{ padding: 18, borderRadius: 18, background: TEAMS[t].soft }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7, justifyContent: "center", marginBottom: 6 }}>
                <span style={{ width: 9, height: 9, borderRadius: 999, background: TEAMS[t].color }} />
                <b style={{ color: TEAMS[t].color, fontSize: 14 }}>{TEAMS[t].name}</b>
              </div>
              <div style={{ fontSize: 40, fontWeight: 800, color: C.ink, letterSpacing: -1 }}>{meta.scores[t] || 0}</div>
              <div style={{ fontSize: 12.5, color: C.sub }}>угадано слов: <b>{meta.stats?.[t] || 0}</b></div>
            </div>
          ))}
        </div>

        {isHost ? (
          <button onClick={playAgain} style={primaryBtn(true, `linear-gradient(120deg, ${TEAMS[0].color}, ${TEAMS[1].color})`, true)}>
            <RotateCcw size={18} /> Сыграть заново
          </button>
        ) : (
          <p style={{ color: C.faint, fontSize: 14 }}>Ведущий может начать новую игру.</p>
        )}
      </div>
    </div>
  );
}

function Confetti({ color, color2 }) {
  const pieces = useMemo(() => Array.from({ length: 46 }, (_, i) => ({
    left: Math.random() * 100, delay: Math.random() * 0.8, dur: 2.4 + Math.random() * 1.8,
    size: 6 + Math.random() * 7, color: [color, color2, C.good, C.amber][i % 4], rot: Math.random() * 360,
  })), [color, color2]);
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" }}>
      {pieces.map((p, i) => (
        <span key={i} className="confetti" style={{
          left: `${p.left}%`, width: p.size, height: p.size * 0.6, background: p.color,
          animationDelay: `${p.delay}s`, animationDuration: `${p.dur}s`, transform: `rotate(${p.rot}deg)`,
          borderRadius: 2 }} />
      ))}
    </div>
  );
}

/* ================================================================== */
/*  Мелкие UI-помощники                                                */
/* ================================================================== */
function Avatar({ nick, color = TEAMS[0].color }) {
  const letter = (nick || "?").trim()[0]?.toUpperCase() || "?";
  return (
    <span style={{ width: 30, height: 30, borderRadius: 10, flexShrink: 0, display: "grid", placeItems: "center",
      background: color, color: "#fff", fontWeight: 800, fontSize: 14 }}>{letter}</span>
  );
}
function Label({ children }) {
  return <label style={{ display: "block", fontSize: 13, fontWeight: 700, color: C.sub, marginBottom: 8 }}>{children}</label>;
}
function Chip({ children, active, onClick, title }) {
  return (
    <button onClick={onClick} title={title} style={{
      padding: "8px 14px", borderRadius: 999, border: "none", cursor: "pointer", fontWeight: 700, fontSize: 13.5,
      background: active ? C.ink : "rgba(43,40,64,0.05)", color: active ? "#fff" : C.sub, transition: "all .18s" }}>
      {children}
    </button>
  );
}
function SetRow({ icon, label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 9, fontSize: 13, fontWeight: 700, color: C.sub }}>
        <span style={{ color: C.faint }}>{icon}</span>{label}
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>{children}</div>
    </div>
  );
}

/* ----- стили-функции ----- */
function card(extra = {}) {
  const { padding = 20, ...rest } = extra;
  return {
    background: C.glass, border: `1px solid rgba(255,255,255,0.6)`, borderRadius: 22,
    boxShadow: C.shadow, backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", padding, ...rest,
  };
}
function pill() {
  return {
    display: "inline-flex", alignItems: "center", padding: "9px 14px", borderRadius: 999,
    background: C.glass, border: `1px solid ${C.line}`, boxShadow: C.shadowSoft, backdropFilter: "blur(12px)",
    cursor: "pointer", fontSize: 13.5, color: C.ink, height: 40,
  };
}
function iconBtn(active) {
  return {
    width: 40, height: 40, display: "grid", placeItems: "center", borderRadius: 12, cursor: "pointer",
    background: active ? active : C.glass, color: active ? "#fff" : C.sub,
    border: `1px solid ${active ? "transparent" : C.line}`, boxShadow: C.shadowSoft, backdropFilter: "blur(12px)",
  };
}
function inp() {
  return {
    width: "100%", height: 50, padding: "0 16px", borderRadius: 14, fontSize: 15.5, color: C.ink,
    background: C.glassSolid, border: `1.5px solid ${C.line}`, outline: "none", fontWeight: 600,
    boxShadow: "inset 0 1px 2px rgba(43,40,64,0.04)", fontFamily: "inherit",
  };
}
function miniInp() {
  return {
    width: 64, height: 36, padding: "0 10px", borderRadius: 999, fontSize: 13, color: C.ink, fontWeight: 700,
    background: "rgba(43,40,64,0.05)", border: "none", outline: "none", fontFamily: "inherit", textAlign: "center",
  };
}
function primaryBtn(enabled, gradient, full) {
  return {
    width: full ? "100%" : "auto", marginTop: full ? 0 : 18, padding: "15px 20px", borderRadius: 16, border: "none",
    cursor: enabled ? "pointer" : "not-allowed", fontSize: 16, fontWeight: 800, color: "#fff",
    background: enabled ? gradient : "rgba(43,40,64,0.18)",
    boxShadow: enabled ? "0 12px 28px -10px rgba(99,102,241,0.55)" : "none",
    display: "flex", alignItems: "center", justifyContent: "center", gap: 9,
    transition: "transform .12s, box-shadow .2s, background .2s", opacity: enabled ? 1 : 0.85,
    flex: full ? "none" : 2,
  };
}
function softBtn() {
  return {
    display: "flex", alignItems: "center", justifyContent: "center", gap: 8, padding: "12px 18px", borderRadius: 14,
    border: `1px solid ${C.line}`, background: C.glassSolid, color: C.ink, fontWeight: 700, fontSize: 14,
    cursor: "pointer", boxShadow: C.shadowSoft, transition: "transform .14s",
  };
}
function bigBtn() {
  return {
    display: "flex", alignItems: "center", justifyContent: "center", gap: 10, padding: "16px", borderRadius: 18,
    fontWeight: 800, fontSize: 15.5, cursor: "pointer", transition: "all .2s",
  };
}
function answerBtn(color, disabled) {
  return {
    display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6,
    aspectRatio: "2 / 1", minHeight: 96, borderRadius: 20,
    border: `3px solid ${color}`,
    cursor: disabled ? "not-allowed" : "pointer", fontWeight: 700, fontSize: 17, color: color,
    background: "#fff", boxShadow: "0 6px 18px -12px rgba(43,40,64,0.30)", opacity: disabled ? 0.5 : 1,
    transition: "transform .12s, opacity .2s, background .2s, box-shadow .2s",
  };
}

/* ----- глобальные стили и анимации ----- */
function Styles() {
  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
      * { box-sizing: border-box; }
      body { margin: 0; }
      button:active { transform: scale(0.97); }
      button[style*="cursor: not-allowed"]:active { transform: none; }
      input::placeholder { color: ${C.faint}; font-weight: 500; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(43,40,64,0.16); border-radius: 999px; }
      ::-webkit-scrollbar-track { background: transparent; }

      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner { width: 30px; height: 30px; border-radius: 999px; border: 3px solid rgba(43,40,64,0.12);
        border-top-color: ${TEAMS[0].color}; animation: spin .8s linear infinite; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
      .fade-up { animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .fade-in { animation: fadeIn .2s ease both; }
      @keyframes popIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: none; } }
      .pop-in { animation: popIn .28s cubic-bezier(.22,1,.36,1) both; }
      @keyframes slideIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: none; } }
      .slide-in { animation: slideIn .3s cubic-bezier(.22,1,.36,1) both; }
      @keyframes wordIn { from { opacity: 0; transform: scale(.9) translateY(8px); } to { opacity: 1; transform: none; } }
      .word-in { animation: wordIn .26s cubic-bezier(.22,1,.36,1) both; }

      /* подсветка ровно по контуру карточки слова */
      @keyframes flashCorrect {
        0% { box-shadow: 0 18px 50px -22px rgba(43,40,64,.4), inset 0 0 0 0 ${C.good}; }
        25% { box-shadow: 0 0 0 4px rgba(16,185,129,.28), inset 0 0 0 3px ${C.good}; }
        100% { box-shadow: 0 18px 50px -22px rgba(43,40,64,.4), inset 0 0 0 0 ${C.good}; }
      }
      @keyframes flashSkip {
        0% { box-shadow: 0 18px 50px -22px rgba(43,40,64,.4), inset 0 0 0 0 ${C.bad}; }
        25% { box-shadow: 0 0 0 4px rgba(244,63,94,.26), inset 0 0 0 3px ${C.bad}; }
        100% { box-shadow: 0 18px 50px -22px rgba(43,40,64,.4), inset 0 0 0 0 ${C.bad}; }
      }
      .flash-correct { animation: flashCorrect .42s ease; }
      .flash-skip { animation: flashSkip .42s ease; }

      @keyframes timerPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
      .timer-pulse { animation: timerPulse 1s ease-in-out infinite; }

      @keyframes confettiFall {
        0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(560px) rotate(540deg); opacity: 0; }
      }
      .confetti { position: absolute; top: -10px; animation-name: confettiFall; animation-timing-function: ease-in; animation-iteration-count: 1; }

      /* Весь интерфейс отображается крупнее — как при 125% масштаба браузера */
      .zoom-layer { zoom: 1.25; }

      .lobby-grid, .play-grid { }
      @media (max-width: 1100px) {
        .lobby-grid, .play-grid { grid-template-columns: 1fr !important; }
        .teams-grid { grid-template-columns: 1fr 1fr !important; }
      }
      @media (max-width: 650px) {
        .teams-grid { grid-template-columns: 1fr !important; }
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
      }
    `}</style>
  );
}


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));

</script>
</body>
</html>
